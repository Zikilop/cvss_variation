# Декартово произведение: каждая комбинация множителей → один скрипт.
# Итого: 5 × 3 × 3 = 45 скриптов, каждый по 3 операции.

mode: grid_cross

parameters:
  # Варьируем сечение артерий
  - name: SInit
    multipliers: [0.8, 0.9, 1.0, 1.1, 1.2]
    filters:
      type: 1

  # Варьируем минимальное давление на конкретном ID
  - name: PMin
    multipliers: [0.9, 1.0, 1.1]
    filters:
      type: 1
      id: 42

  # Варьируем длину вен
  - name: Leng
    multipliers: [0.95, 1.0, 1.05]
    filters:
      type: 2